services:
  postgres:
    image: postgres:16-alpine
    container_name: zalo-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zalo_crm
    ports:
      - "5432:5432"
    volumes:
      - zalo_crm_pgdata:/var/lib/postgresql/data

volumes:
  zalo_crm_pgdata:
