services:
  postgres:
    image: postgres:16-alpine
    container_name: zalo-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: zalo_crm
    volumes:
      - zalo_crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zalo_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: zalo-crm-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/zalo_crm
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - zalo_crm_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  zalo_crm_pgdata:
  zalo_crm_uploads:
